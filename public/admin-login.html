<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kuda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .admin-login-box { background: white; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .admin-login-header { text-align: center; margin-bottom: 30px; }
        .admin-login-header h1 { font-size: 24px; color: #333; margin-bottom: 10px; font-weight: 600; }
        .admin-login-header p { color: #666; font-size: 14px; }
        .admin-login-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 14px; font-weight: 500; color: #333; }
        .form-group input { padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .admin-error { color: #e74c3c; font-size: 13px; padding: 12px; background: #fadbd8; border-radius: 6px; display: none; }
        .admin-error.show { display: block; }
        .admin-submit-btn { padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .admin-submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .admin-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="admin-login-box">
        <div class="admin-login-header">
            <h1>Admin Panel</h1>
            <p>Secure Access Required</p>
        </div>
        <form class="admin-login-form" id="adminLoginForm">
            <div class="admin-error" id="adminError"></div>
            <div class="form-group">
                <label for="adminPassword">Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password" autocomplete="off" required>
            </div>
            <button type="submit" class="admin-submit-btn" id="adminSubmitBtn">Access Admin Panel</button>
        </form>
        <div class="back-link">
            <a href="/">Back to App</a>
        </div>
    </div>

    <script>
        const adminLoginForm = document.getElementById('adminLoginForm');
        const adminPassword = document.getElementById('adminPassword');
        const adminError = document.getElementById('adminError');
        const adminSubmitBtn = document.getElementById('adminSubmitBtn');

        adminLoginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            adminSubmitBtn.disabled = true;
            try {
                const response = await fetch('/api/verify-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPassword.value })
                });
                const data = await response.json();
                if (data.success) {
                    adminError.classList.remove('show');
                    window.location.href = '/admin';
                } else {
                    adminError.textContent = 'Incorrect admin password. Please try again.';
                    adminError.classList.add('show');
                    adminPassword.value = '';
                    adminPassword.focus();
                    adminSubmitBtn.disabled = false;
                    setTimeout(() => { adminError.classList.remove('show'); }, 3000);
                }
            } catch (error) {
                console.error('Error:', error);
                adminError.textContent = 'An error occurred. Please try again.';
                adminError.classList.add('show');
                adminSubmitBtn.disabled = false;
                setTimeout(() => { adminError.classList.remove('show'); }, 3000);
            }
        });
        adminPassword.focus();
    </script>
</body>
</html>
