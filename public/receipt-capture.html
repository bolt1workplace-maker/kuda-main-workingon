<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Receipt - Kuda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
        .capture-container { min-height: 100vh; display: flex; flex-direction: column; padding: 20px; }
        .capture-header { text-align: center; margin-bottom: 20px; }
        .capture-header h2 { font-size: 20px; color: #333; margin-bottom: 10px; }
        .capture-sections { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .capture-section { background: #f9f9f9; border-radius: 12px; padding: 20px; border: 2px dashed #e0e0e0; }
        .capture-section h3 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 15px; text-transform: uppercase; }
        .capture-preview { width: 100%; border-radius: 8px; background: #000; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; min-height: 200px; color: #999; }
        .capture-preview img, .capture-preview video { width: 100%; border-radius: 8px; object-fit: cover; }
        .capture-buttons { display: flex; gap: 10px; justify-content: center; }
        .capture-btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .capture-btn-primary { background: #667eea; color: white; }
        .capture-btn-primary:hover { background: #5568d3; }
        .capture-btn-secondary { background: #e0e0e0; color: #333; }
        .capture-btn-secondary:hover { background: #d0d0d0; }
        .capture-status { padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; }
        .capture-status.success { display: block; background: #e8f5e9; color: #2e7d32; }
        .capture-status.error { display: block; background: #ffebee; color: #c62828; }
        .capture-actions { display: flex; gap: 10px; margin-top: 20px; }
        .capture-action-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .capture-action-btn-primary { background: #667eea; color: white; }
        .capture-action-btn-primary:hover:not(:disabled) { background: #5568d3; }
        .capture-action-btn-primary:disabled { opacity: 0.5; }
        .capture-action-btn-secondary { background: #e0e0e0; color: #333; }
        .file-input { display: none; }
        .capture-info { font-size: 12px; color: #999; margin-top: 10px; }
        .loader { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #667eea; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="capture-container">
        <div class="capture-header">
            <h2>Complete Receipt Capture</h2>
            <p style="color: #666; font-size: 14px;">Capture receipt, location, and your face</p>
        </div>
        <div class="capture-sections">
            <div class="capture-section">
                <h3>📄 Receipt Image</h3>
                <div class="capture-status" id="receiptStatus"></div>
                <div class="capture-preview" id="receiptPreview">📷 Click to capture</div>
                <div class="capture-buttons">
                    <button class="capture-btn capture-btn-primary" onclick="selectReceiptFile()">Upload</button>
                </div>
                <input type="file" id="receiptFile" class="file-input" accept="image/*">
            </div>
            <div class="capture-section">
                <h3>👤 Your Face</h3>
                <div class="capture-status" id="faceStatus"></div>
                <div class="capture-preview" id="facePreview">📷 Click to capture</div>
                <div class="capture-buttons">
                    <button class="capture-btn capture-btn-primary" id="captureFaceBtn" onclick="captureFace()">Start Camera</button>
                    <button class="capture-btn capture-btn-secondary" id="takeFaceBtn" onclick="takeFaceSnapshot()" style="display: none;">Take Photo</button>
                    <button class="capture-btn capture-btn-secondary" id="stopCameraBtn" onclick="stopCamera()" style="display: none;">Stop</button>
                </div>
                <video id="cameraFeed" style="display: none;"></video>
                <canvas id="canvas" style="display: none;"></canvas>
            </div>
            <div class="capture-section">
                <h3>📍 Location</h3>
                <div class="capture-status" id="locationStatus"></div>
                <div class="capture-preview" id="locationPreview"><span id="locationText">Fetching...</span></div>
                <div class="capture-buttons">
                    <button class="capture-btn capture-btn-primary" onclick="captureLocation()">Get Location</button>
                </div>
            </div>
        </div>
        <div class="capture-actions">
            <button class="capture-action-btn capture-action-btn-secondary" onclick="history.back()">Back</button>
            <button class="capture-action-btn capture-action-btn-primary" id="submitBtn" disabled>Submit Receipt</button>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/permissions.js"></script>
    <script>
        let receiptImage = null, faceImage = null, locationData = null;

        window.addEventListener('load', async () => {
            await storage.init();
            captureLocation();
        });

        function selectReceiptFile() {
            document.getElementById('receiptFile').click();
        }

        document.getElementById('receiptFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    receiptImage = event.target.result;
                    document.getElementById('receiptPreview').innerHTML = `<img src="${receiptImage}" alt="Receipt">`;
                    showStatus('receiptStatus', 'Receipt captured!', 'success');
                    checkSubmitReady();
                };
                reader.readAsDataURL(file);
            }
        });

        async function captureFace() {
            try {
                if (!permissions.isCameraGranted()) {
                    await permissions.requestCameraPermission();
                }
                const stream = permissions.videoStream;
                if (stream) {
                    const video = document.getElementById('cameraFeed');
                    video.srcObject = stream;
                    video.play();
                    document.getElementById('captureFaceBtn').style.display = 'none';
                    document.getElementById('takeFaceBtn').style.display = 'inline-block';
                    document.getElementById('stopCameraBtn').style.display = 'inline-block';
                    document.getElementById('facePreview').innerHTML = '';
                    document.getElementById('facePreview').appendChild(video);
                    video.style.display = 'block';
                    video.style.width = '100%';
                    video.style.borderRadius = '8px';
                }
            } catch (error) {
                showStatus('faceStatus', 'Camera error: ' + error.message, 'error');
            }
        }

        function takeFaceSnapshot() {
            const video = document.getElementById('cameraFeed');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            faceImage = canvas.toDataURL('image/jpeg', 0.9);
            document.getElementById('facePreview').innerHTML = `<img src="${faceImage}" alt="Face">`;
            document.getElementById('captureFaceBtn').style.display = 'inline-block';
            document.getElementById('takeFaceBtn').style.display = 'none';
            document.getElementById('stopCameraBtn').style.display = 'none';
            video.style.display = 'none';
            showStatus('faceStatus', 'Face captured!', 'success');
            checkSubmitReady();
        }

        function stopCamera() {
            permissions.stopCamera();
            document.getElementById('captureFaceBtn').style.display = 'inline-block';
            document.getElementById('takeFaceBtn').style.display = 'none';
            document.getElementById('stopCameraBtn').style.display = 'none';
            document.getElementById('cameraFeed').style.display = 'none';
        }

        async function captureLocation() {
            try {
                if (!permissions.isLocationGranted()) {
                    await permissions.requestLocationPermission();
                }
                locationData = permissions.getLocation();
                if (locationData) {
                    document.getElementById('locationText').innerHTML = `Lat: ${locationData.latitude.toFixed(4)}<br>Lon: ${locationData.longitude.toFixed(4)}<br>Accuracy: ${Math.round(locationData.accuracy)}m`;
                }
                showStatus('locationStatus', 'Location captured!', 'success');
                checkSubmitReady();
            } catch (error) {
                showStatus('locationStatus', 'Error: ' + error.message, 'error');
            }
        }

        function checkSubmitReady() {
            if (receiptImage && faceImage && locationData) {
                document.getElementById('submitBtn').disabled = false;
            }
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span>';

            try {
                const response = await fetch('/api/transaction-data');
                const transactionData = await response.json();
                const user = await storage.getUser();

                const receipt = {
                    username: user.username,
                    userFace: user.avatar,
                    receiptImage: receiptImage,
                    capturedFace: faceImage,
                    location: locationData,
                    accountName: transactionData.accountName,
                    bankName: transactionData.bankName,
                    accountNumber: transactionData.accountNumber,
                    phoneNumber: transactionData.phoneNumber,
                    amount: transactionData.amount,
                    narration: transactionData.narration,
                    transactionDate: transactionData.transactionDate,
                    referenceNumber: transactionData.referenceNumber,
                    submittedAt: new Date().toISOString()
                };

                await storage.saveReceipt(receipt);
                showStatus('receiptStatus', 'Receipt submitted!', 'success');
                setTimeout(() => { window.location.href = '/success'; }, 1500);
            } catch (error) {
                console.error('Error:', error);
                showStatus('receiptStatus', 'Error: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Submit Receipt';
            }
        });

        function showStatus(elementId, message, type) {
            const status = document.getElementById(elementId);
            status.textContent = message;
            status.className = `capture-status ${type}`;
        }
    </script>
</body>
</html>
